<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Clientes - Smash do Cabo</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">
  <link rel="stylesheet" href="layout.css">
</head>
<body>

  <div id="sidebar-container"></div>

  <div class="conteudo">
    <div class="topbar d-flex justify-content-between align-items-center mb-4">
      <h3>Clientes</h3>
    </div>

    <div class="card p-3">
      <div class="table-responsive">
        <table class="table table-striped table-sm">
          <thead>
            <tr>
              <th>Nome</th>
              <th>Email</th>
              <th>Telefone</th>
              <th>Aniversário</th>
              <th>Cadastro</th>
              <th>Ações</th>
            </tr>
          </thead>
          <tbody id="tabelaClientes"></tbody>
        </table>
      </div>
    </div>
  </div>

  <script src="config.js"></script>
  <script src="sidebar.js"></script>
  <script>
    async function carregarClientes() {
      try {
        const res = await fetch(
          `${CONFIG.SUPABASE_URL}/rest/v1/feedback_detalhado?select=id,nome,email,telefone,data_nascimento,created_at`,
          {
            headers: {
              apikey: CONFIG.SUPABASE_ANON_KEY,
              Authorization: `Bearer ${CONFIG.SUPABASE_ANON_KEY}`
            }
          }
        );

        if (!res.ok) {
          console.error("Erro na requisição:", await res.json());
          return;
        }

        const dados = await res.json();
        const tbody = document.getElementById('tabelaClientes');
        tbody.innerHTML = '';

        dados.forEach(cli => {
          const tr = document.createElement('tr');
          tr.innerHTML = `
            <td>${cli.nome || '-'}</td>
            <td>${cli.email || '-'}</td>
            <td>${cli.telefone || '-'}</td>
            <td>${cli.data_nascimento || '-'}</td>
            <td>${new Date(cli.created_at).toLocaleDateString('pt-BR')}</td>
            <td>
              <button onclick="editarCliente(${cli.id})" class="btn btn-sm btn-primary me-1" title="Editar">
                <i class="bi bi-pencil"></i>
              </button>
              <a href="https://wa.me/55${cli.telefone?.replace(/[^0-9]/g, '')}" target="_blank" class="btn btn-sm btn-success me-1" title="WhatsApp">
                <i class="bi bi-whatsapp"></i>
              </a>
              <button onclick="excluirCliente(${cli.id})" class="btn btn-sm btn-danger" title="Excluir">
                <i class="bi bi-trash"></i>
              </button>
            </td>
          `;
          tbody.appendChild(tr);
        });

      } catch (err) {
        console.error("Erro ao carregar clientes:", err);
      }
    }

    function editarCliente(id) {
      window.location.href = `editar_cliente.html?id=${id}`;
    }

    async function excluirCliente(id) {
      if (!confirm("Tem certeza que deseja excluir este cliente?")) return;

      const res = await fetch(
        `${CONFIG.SUPABASE_URL}/rest/v1/feedback_detalhado?id=eq.${id}`,
        {
          method: 'DELETE',
          headers: {
            apikey: CONFIG.SUPABASE_ANON_KEY,
            Authorization: `Bearer ${CONFIG.SUPABASE_ANON_KEY}`
          }
        }
      );

      if (res.ok) {
        alert("Cliente excluído com sucesso.");
        carregarClientes();
      } else {
        console.error("Erro ao excluir:", await res.json());
        alert("Erro ao excluir cliente.");
      }
    }

    carregarClientes();
  </script>

</body>
</html>
