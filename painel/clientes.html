<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Clientes - Smash do Cabo</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">
  <link rel="stylesheet" href="layout.css">
</head>
<body>

  <div id="sidebar-container"></div>

  <div class="conteudo">
    <div class="topbar d-flex justify-content-between align-items-center mb-4">
      <h3>Clientes</h3>
    </div>

    <div class="card p-3 mb-3">
      <div class="row g-2 align-items-end">

        <div class="col-md-2">
          <label class="form-label mb-1">Mês</label>
          <select id="filtroMes" class="form-select">
            <option value="1">Janeiro</option>
            <option value="2">Fevereiro</option>
            <option value="3">Março</option>
            <option value="4">Abril</option>
            <option value="5">Maio</option>
            <option value="6">Junho</option>
            <option value="7">Julho</option>
            <option value="8">Agosto</option>
            <option value="9">Setembro</option>
            <option value="10">Outubro</option>
            <option value="11">Novembro</option>
            <option value="12">Dezembro</option>
          </select>
        </div>

        <div class="col-md-2">
          <label class="form-label mb-1">Ano</label>
          <select id="filtroAno" class="form-select"></select>
        </div>

        <div class="col-md-3">
          <label class="form-label mb-1">Buscar nome</label>
          <input type="text" id="buscarNome" class="form-control" placeholder="Nome do cliente">
        </div>

        <div class="col-md-2">
          <button onclick="aplicarFiltro()" class="btn btn-primary w-100">Filtrar</button>
        </div>

      </div>
    </div>

    <div id="resumoLinha" class="mb-2 fw-bold text-muted small"></div>

    <div class="card p-3">
      <div class="table-responsive">
        <table class="table table-striped table-sm">
          <thead>
            <tr>
              <th>Nome</th>
              <th>Email</th>
              <th>Telefone</th>
              <th>Aniversário</th>
              <th>Cadastro</th>
              <th>Ações</th>
            </tr>
          </thead>
          <tbody id="tabelaClientes"></tbody>
        </table>
      </div>
    </div>

    <div class="d-flex justify-content-between align-items-center mt-3">
      <button class="btn btn-secondary" id="btnAnterior" onclick="mudarPagina(-1)">Anterior</button>
      <span id="paginaAtual"></span>
      <button class="btn btn-secondary" id="btnProxima" onclick="mudarPagina(1)">Próxima</button>
    </div>

  </div>

  <!-- 🔥 ORDEM CORRETA -->
  <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
  <script src="config.js"></script>
  <script src="sidebar.js"></script>

  <script>
    const LIMITE = 30;
    let pagina = 1;
    let dadosAtuais = [];

    async function getToken() {
      const { data } = await supabaseClient.auth.getSession();
      return data.session?.access_token;
    }

    function preencherAnos() {
      const anoAtual = new Date().getFullYear();
      const sel = document.getElementById('filtroAno');
      for (let a = anoAtual; a >= anoAtual - 2; a--) {
        const opt = document.createElement('option');
        opt.value = a;
        opt.textContent = a;
        sel.appendChild(opt);
      }
    }

    function definirMesAtual() {
      const hoje = new Date();
      document.getElementById('filtroMes').value = hoje.getMonth() + 1;
      document.getElementById('filtroAno').value = hoje.getFullYear();
    }

    async function aplicarFiltro() {
      const mes = document.getElementById('filtroMes').value.padStart(2, '0');
      const ano = document.getElementById('filtroAno').value;
      const nome = document.getElementById('buscarNome').value.trim().toLowerCase();

      const inicio = `${ano}-${mes}-01`;
      const fim = new Date(ano, mes, 1).toISOString().split('T')[0];

      const token = await getToken();

      if (!token) {
        alert("Sessão expirada. Faça login novamente.");
        window.location.href = "index.html";
        return;
      }

      const res = await fetch(
        `${CONFIG.SUPABASE_URL}/rest/v1/feedback_detalhado?select=id,nome,email,telefone,data_nascimento,created_at&created_at=gte.${inicio}&created_at=lt.${fim}&order=created_at.desc`,
        {
          headers: {
            apikey: CONFIG.SUPABASE_ANON_KEY,
            Authorization: `Bearer ${token}`
          }
        }
      );

      let dados = await res.json();

      if (nome) {
        dados = dados.filter(d => d.nome?.toLowerCase().includes(nome));
      }

      dadosAtuais = dados;
      pagina = 1;
      renderizar();
    }

    function renderizar() {
      const tbody = document.getElementById('tabelaClientes');
      tbody.innerHTML = '';

      const inicio = (pagina - 1) * LIMITE;
      const fim = inicio + LIMITE;
      const pageDados = dadosAtuais.slice(inicio, fim);
      const totalPaginas = Math.ceil(dadosAtuais.length / LIMITE) || 1;

      document.getElementById('resumoLinha').textContent =
        `${dadosAtuais.length} cliente(s) encontrado(s)`;

      document.getElementById('paginaAtual').textContent =
        `Página ${pagina} de ${totalPaginas}`;

      document.getElementById('btnAnterior').disabled = pagina === 1;
      document.getElementById('btnProxima').disabled = pagina >= totalPaginas;

      if (pageDados.length === 0) {
        tbody.innerHTML = '<tr><td colspan="6" class="text-center text-muted">Nenhum cliente encontrado.</td></tr>';
        return;
      }

      pageDados.forEach(cli => {
        const tr = document.createElement('tr');
        tr.innerHTML = `
          <td>${cli.nome || '-'}</td>
          <td>${cli.email || '-'}</td>
          <td>${cli.telefone || '-'}</td>
          <td>${cli.data_nascimento || '-'}</td>
          <td>${new Date(cli.created_at).toLocaleDateString('pt-BR')}</td>
          <td>
            <button onclick="editarCliente(${cli.id})" class="btn btn-sm btn-primary me-1">
              ✏️
            </button>
            <a href="https://wa.me/55${cli.telefone?.replace(/[^0-9]/g, '')}" target="_blank" class="btn btn-sm btn-success me-1">
              WhatsApp
            </a>
            <button onclick="excluirCliente(${cli.id})" class="btn btn-sm btn-danger">
              🗑️
            </button>
          </td>
        `;
        tbody.appendChild(tr);
      });
    }

    function mudarPagina(direcao) {
      const totalPaginas = Math.ceil(dadosAtuais.length / LIMITE) || 1;
      pagina = Math.min(Math.max(pagina + direcao, 1), totalPaginas);
      renderizar();
    }

    function editarCliente(id) {
      window.location.href = `editar_cliente.html?id=${id}`;
    }

    async function excluirCliente(id) {
      if (!confirm("Tem certeza que deseja excluir este cliente?")) return;

      const token = await getToken();

      const res = await fetch(
        `${CONFIG.SUPABASE_URL}/rest/v1/feedback_detalhado?id=eq.${id}`,
        {
          method: 'DELETE',
          headers: {
            apikey: CONFIG.SUPABASE_ANON_KEY,
            Authorization: `Bearer ${token}`
          }
        }
      );

      if (res.ok) {
        alert("Cliente excluído com sucesso.");
        aplicarFiltro();
      } else {
        alert("Erro ao excluir cliente.");
      }
    }

    preencherAnos();
    definirMesAtual();
    aplicarFiltro();
  </script>

</body>
</html>
