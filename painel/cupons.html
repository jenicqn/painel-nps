<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cupons - Smash do Cabo</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="layout.css">
<link rel="stylesheet" href="cupons.css">
</head>

<body>

<div id="sidebar-container"></div>

<div class="conteudo">

  <div class="topbar mb-4">
    <h3>Controle de Cupons</h3>
  </div>

  <!-- KPIs -->
  <div class="row g-3 mb-4">
    <div class="col-md-3">
      <div class="kpi-card">
        <div class="kpi-title">Gerados no Mês</div>
        <div id="kpiGerados" class="kpi-value">-</div>
      </div>
    </div>
    <div class="col-md-3">
      <div class="kpi-card">
        <div class="kpi-title">Utilizados no Mês</div>
        <div id="kpiUtilizados" class="kpi-value">-</div>
      </div>
    </div>
    <div class="col-md-3">
      <div class="kpi-card">
        <div class="kpi-title">Taxa de Uso</div>
        <div id="kpiTaxaUso" class="kpi-value">-</div>
      </div>
    </div>
    <div class="col-md-3">
      <div class="kpi-card">
        <div class="kpi-title">Conversão</div>
        <div id="kpiConversao" class="kpi-value">-</div>
      </div>
    </div>
  </div>

  <!-- FILTROS -->
  <div class="card p-3 mb-4">
    <div class="row g-2">
      <div class="col-md-4">
        <input type="month" id="filtroMes" class="form-control">
      </div>
      <div class="col-md-4">
        <select id="filtroStatus" class="form-select">
          <option value="">Todos</option>
          <option value="disponivel">Disponível</option>
          <option value="utilizado">Utilizado</option>
        </select>
      </div>
      <div class="col-md-4">
        <button id="btnFiltrar" class="btn btn-primary w-100">Filtrar</button>
      </div>
    </div>
  </div>

  <!-- TABELA TODOS OS CUPONS -->
  <div class="card p-3 mb-4">
    <h6 class="mb-3">Cupons</h6>
    <div class="table-responsive">
      <table class="table table-hover table-sm align-middle">
        <thead class="table-light">
          <tr>
            <th>Código</th>
            <th>Cliente</th>
            <th>Brinde</th>
            <th>Validade</th>
            <th>Status</th>
            <th>Ação</th>
          </tr>
        </thead>
        <tbody id="tabelaCupons"></tbody>
      </table>
    </div>
    <div id="paginacaoCupons" class="d-flex justify-content-between align-items-center mt-3"></div>
  </div>

  <!-- TABELA CUPONS UTILIZADOS -->
<div class="card p-3 mb-4">
  <div class="d-flex justify-content-between align-items-center mb-3">
    <h6 class="mb-0">Cupons Utilizados no Mês</h6>
    <div class="d-flex gap-2 align-items-end">
      <div>
        <label class="form-label mb-1 small">De</label>
        <input type="date" id="utilizadosDataInicio" class="form-control form-control-sm">
      </div>
      <div>
        <label class="form-label mb-1 small">Até</label>
        <input type="date" id="utilizadosDataFim" class="form-control form-control-sm">
      </div>
      <button class="btn btn-sm btn-primary" onclick="filtrarUtilizados()">Filtrar</button>
    </div>
  </div>
  <div class="table-responsive">
    <table class="table table-hover table-sm align-middle">
      <thead class="table-light">
        <tr>
          <th>Código</th>
          <th>Cliente</th>
          <th>Brinde</th>
          <th>Data Utilizado</th>
          <th>Validade</th>
        </tr>
      </thead>
      <tbody id="tabelaUtilizados"></tbody>
    </table>
  </div>
  <div id="paginacaoUtilizados" class="d-flex justify-content-between align-items-center mt-3"></div>
</div>

</div>

<script src="https://unpkg.com/@supabase/supabase-js@2"></script>
<script src="config.js"></script>
<script src="sidebar.js"></script>
<script src="cupons.js"></script>

</body>
</html>
