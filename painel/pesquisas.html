<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pesquisas - Smash do Cabo</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="layout.css">

<style>
.builder-list {
  display: flex;
  flex-direction: column;
  gap: 12px;
}

.builder-item {
  background: #ffffff;
  border: 1px solid #e9ecef;
  border-radius: 12px;
  padding: 16px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  transition: all 0.2s ease;
}

.builder-item:hover {
  box-shadow: 0 6px 20px rgba(0,0,0,0.08);
}

.builder-left {
  display: flex;
  gap: 15px;
  align-items: flex-start;
}

.drag-handle {
  cursor: grab;
  font-size: 20px;
  color: #bbb;
}

.question-title {
  font-weight: 600;
  margin-bottom: 5px;
}

.preview-box {
  background: #f8f9fa;
  padding: 20px;
  border-radius: 12px;
  min-height: 400px;
}
</style>

</head>

<body>

<div id="sidebar-container"></div>

<div class="conteudo">

  <div class="topbar d-flex justify-content-between align-items-center mb-4">
    <h3>Pesquisas</h3>
    <button class="btn btn-primary" onclick="abrirModalNova()">+ Nova Pesquisa</button>
  </div>

  <div class="card p-3">
    <table class="table table-bordered align-middle">
      <thead>
        <tr>
          <th>Nome</th>
          <th>Slug</th>
          <th>Status</th>
          <th>Ações</th>
        </tr>
      </thead>
      <tbody id="tabelaPesquisas"></tbody>
    </table>
  </div>

</div>

<!-- MODAL GERENCIAR PERGUNTAS -->

<div class="modal fade" id="modalPerguntas" tabindex="-1">
  <div class="modal-dialog modal-xl modal-dialog-centered">
    <div class="modal-content">

      <div class="modal-header">
        <h5 class="modal-title">Gerenciar Perguntas</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>

      <div class="modal-body">

        <input type="hidden" id="pesquisaPerguntasId">

        <div class="row">

          <!-- COLUNA BUILDER -->
          <div class="col-md-6 border-end">

            <div class="d-flex justify-content-between align-items-center mb-4">
              <h6 class="mb-0">Perguntas</h6>
              <button class="btn btn-success btn-sm" onclick="abrirModalPergunta()">
                + Nova
              </button>
            </div>

            <div id="listaPerguntas" class="builder-list"></div>

          </div>

          <!-- COLUNA PREVIEW -->
          <div class="col-md-6">

            <h6 class="mb-3">Preview</h6>
            <div id="previewPerguntas" class="preview-box"></div>

          </div>

        </div>

      </div>

    </div>
  </div>
</div>

<!-- MODAL PERGUNTA -->

<div class="modal fade" id="modalPerguntaForm" tabindex="-1">
  <div class="modal-dialog">
    <div class="modal-content">

      <div class="modal-header">
        <h5 class="modal-title">Pergunta</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>

      <div class="modal-body">

        <input type="hidden" id="perguntaId">

        <div class="mb-3">
          <label class="form-label">Texto</label>
          <input type="text" id="perguntaTexto" class="form-control">
        </div>

        <div class="mb-3">
          <label class="form-label">Tipo</label>
          <select id="perguntaTipo" class="form-select">
            <option value="texto">Texto</option>
            <option value="textarea">Textarea</option>
            <option value="escala_0_10">Escala 0 a 10</option>
            <option value="escala_1_5">Escala 1 a 5</option>
          </select>
        </div>

        <div class="form-check mb-3">
          <input class="form-check-input" type="checkbox" id="perguntaObrigatoria">
          <label class="form-check-label">Obrigatória</label>
        </div>

        <button class="btn btn-success w-100" onclick="salvarPergunta()">
          Salvar
        </button>

      </div>
    </div>
  </div>
</div>

<script src="https://unpkg.com/@supabase/supabase-js@2"></script>
<script src="config.js"></script>
<script src="sidebar.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>
<script src="pesquisas.js"></script>

</body>
</html>
