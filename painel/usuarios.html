<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Usuários - Smash do Cabo</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <link rel="stylesheet" href="layout.css">
</head>
<body>

  <div id="sidebar-container"></div>

  <div class="conteudo">
    <div class="topbar d-flex justify-content-between align-items-center mb-4">
      <h3>Usuários</h3>
      <button class="btn btn-primary" id="btnNovoUsuario">+ Novo Usuário</button>
    </div>

    <div class="card p-3">
      <div class="table-responsive">
        <table class="table table-striped table-sm align-middle">
          <thead class="table-light">
            <tr>
              <th>Nome</th>
              <th>Email</th>
              <th>Nível</th>
              <th>Status</th>
              <th>Ações</th>
            </tr>
          </thead>
          <tbody id="corpoTabela">
            <tr><td colspan="5" class="text-center text-muted">Carregando...</td></tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>

  <!-- Modal Novo Usuário -->
  <div class="modal fade" id="modalNovo" tabindex="-1">
    <div class="modal-dialog">
      <form id="formNovo" class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title">Novo Usuário</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
        </div>
        <div class="modal-body">
          <div class="mb-3">
            <label class="form-label">Nome</label>
            <input type="text" class="form-control" id="novoNome" required>
          </div>
          <div class="mb-3">
            <label class="form-label">Email</label>
            <input type="email" class="form-control" id="novoEmail" required>
          </div>
          <div class="mb-3">
            <label class="form-label">Senha</label>
            <input type="password" class="form-control" id="novaSenha" required minlength="6">
          </div>
          <div class="mb-3">
            <label class="form-label">Nível</label>
            <select class="form-select" id="novoNivel">
              <option value="user">User</option>
              <option value="adm">Administrador</option>
            </select>
          </div>
          <div id="alertNovo" class="alert d-none mt-2"></div>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
          <button type="submit" class="btn btn-primary">Criar</button>
        </div>
      </form>
    </div>
  </div>

  <!-- Modal Editar -->
  <div class="modal fade" id="modalEditar" tabindex="-1">
    <div class="modal-dialog">
      <form id="formEditar" class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title">Editar Usuário</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
        </div>
        <div class="modal-body">
          <input type="hidden" id="editarId">
          <div class="mb-3">
            <label class="form-label">Nome</label>
            <input type="text" class="form-control" id="editarNome" required>
          </div>
          <div class="mb-3">
            <label class="form-label">Email</label>
            <input type="email" class="form-control" id="editarEmail" required>
          </div>
          <div class="mb-3">
            <label class="form-label">Nível</label>
            <select class="form-select" id="editarNivel">
              <option value="user">User</option>
              <option value="adm">Administrador</option>
            </select>
          </div>
          <div id="alertEditar" class="alert d-none mt-2"></div>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
          <button type="submit" class="btn btn-success">Salvar</button>
        </div>
      </form>
    </div>
  </div>

  <!-- Modal Senha -->
  <div class="modal fade" id="modalSenha" tabindex="-1">
    <div class="modal-dialog">
      <form id="formSenha" class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title">Trocar Senha</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
        </div>
        <div class="modal-body">
          <input type="hidden" id="senhaId">
          <div class="mb-3">
            <label class="form-label">Nova Senha</label>
            <input type="password" class="form-control" id="novaSenhaModal" required minlength="6">
          </div>
          <div class="mb-3">
            <label class="form-label">Confirmar Senha</label>
            <input type="password" class="form-control" id="confirmarSenha" required minlength="6">
          </div>
          <div id="alertSenha" class="alert d-none mt-2"></div>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
          <button type="submit" class="btn btn-success">Atualizar</button>
        </div>
      </form>
    </div>
  </div>

  <script src="config.js"></script>
  <script src="sidebar.js"></script>
  <script src="usuarios.js"></script>

</body>
</html>
