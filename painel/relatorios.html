<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Relatórios - Smash do Cabo</title>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">
  <link rel="stylesheet" href="layout.css">
</head>

<body>

<div id="sidebar-container"></div>

<div class="conteudo">

  <div class="topbar d-flex justify-content-between align-items-center mb-4">
    <h3 id="tituloRelatorio">Relatórios</h3>
    <div class="d-flex gap-2">
      <button class="btn btn-sm btn-danger" onclick="exportarPDF()">PDF</button>
      <button class="btn btn-sm btn-success" onclick="exportarExcel()">Excel</button>
    </div>
  </div>

  <!-- conteúdo mantido -->

</div>

<!-- SCRIPTS -->
<script src="https://unpkg.com/@supabase/supabase-js@2"></script>
<script src="config.js"></script>
<script src="sidebar.js"></script>

<script>

/* ======================================================= */

const SUPABASE_URL = CONFIG.SUPABASE_URL;
const SUPABASE_ANON_KEY = CONFIG.SUPABASE_ANON_KEY;
const LIMITE = 20;

/* ================= TOKEN ================= */

async function getToken() {
  const { data } = await supabaseClient.auth.getSession();
  return data.session?.access_token;
}

async function fetchComAuth(url) {

  const token = await getToken();

  if (!token) {
    alert("Sessão expirada. Faça login novamente.");
    window.location.href = "index.html";
    return [];
  }

  const res = await fetch(url, {
    headers: {
      apikey: SUPABASE_ANON_KEY,
      Authorization: `Bearer ${token}`
    }
  });

  return await res.json();
}

/* ================= HELPERS ================= */

function toISO(date) {
  return date.toISOString().split('T')[0];
}

function hoje() {
  return new Date();
}

function formatarData(iso) {
  if (!iso) return '-';
  const [y,m,d] = iso.split('-');
  return `${d}/${m}/${y}`;
}

function isMorador(valor) {
  return String(valor || '').toLowerCase().includes('morador');
}

/* ================= FILTROS ================= */

function inicializarFiltros() {

  const h = hoje();

  document.getElementById('anivMes').value = h.getMonth() + 1;

  const selAno = document.getElementById('anivAno');
  selAno.innerHTML = "";

  for (let a = h.getFullYear(); a >= h.getFullYear() - 2; a--) {
    const opt = document.createElement('option');
    opt.value = a;
    opt.textContent = a;
    selAno.appendChild(opt);
  }

  selAno.value = h.getFullYear();

  const inicioMes = new Date(h.getFullYear(), h.getMonth(), 1);
  const fimMes = new Date(h.getFullYear(), h.getMonth() + 1, 0);

  document.getElementById('cuponsDataInicio').value = toISO(inicioMes);
  document.getElementById('cuponsDataFim').value = toISO(fimMes);
}

/* ================= VARIÁVEIS ================= */

let todosAniversariantes = [];
let todosCupons = [];

/* ================= ANIVERSARIANTES ================= */

async function carregarAniversariantes() {

  const mes = String(document.getElementById('anivMes').value).padStart(2, '0');

  const dados = await fetchComAuth(
    `${SUPABASE_URL}/rest/v1/feedback_detalhado?select=nome,telefone,data_nascimento,morador&data_nascimento=not.is.null`
  );

  todosAniversariantes = dados
    .filter(c => c.data_nascimento?.slice(5,7) === mes);

  console.log("ANIVERSARIANTES:", todosAniversariantes);
}

/* ================= CUPONS ================= */

async function carregarCupons() {

  const ini = document.getElementById('cuponsDataInicio').value;
  const fim = document.getElementById('cuponsDataFim').value;

  const cupons = await fetchComAuth(
    `${SUPABASE_URL}/rest/v1/cupons?select=codigo,cliente_nome,cliente_telefone,valido_ate&valido_ate=gte.${ini}&valido_ate=lte.${fim}&utilizado=is.false`
  );

  console.log("CUPONS:", cupons);
}

/* ================= EXPORT ================= */

function exportarPDF() {
  html2pdf().from(document.querySelector('.conteudo')).save('relatorio.pdf');
}

function exportarExcel() {
  const wb = XLSX.utils.book_new();
  XLSX.writeFile(wb, 'relatorio.xlsx');
}

/* ================= INIT ================= */

const meses = ["Janeiro","Fevereiro","Março","Abril","Maio","Junho","Julho","Agosto","Setembro","Outubro","Novembro","Dezembro"];

document.getElementById('tituloRelatorio').textContent =
  `Relatórios — ${meses[hoje().getMonth()]} ${hoje().getFullYear()}`;

inicializarFiltros();
carregarAniversariantes();
carregarCupons();

</script>

</body>
</html>
