<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Relatórios - Smash do Cabo</title>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="layout.css">
</head>

<body>

<div id="sidebar-container"></div>

<div class="conteudo">

  <div class="topbar d-flex justify-content-between align-items-center mb-4">
    <h3 id="tituloRelatorio">Relatórios</h3>
    <div class="d-flex gap-2">
      <button class="btn btn-sm btn-danger" onclick="exportarPDF()">PDF</button>
      <button class="btn btn-sm btn-success" onclick="exportarExcel()">Excel</button>
    </div>
  </div>

  <!-- 🔥 FILTRO ANIVERSARIANTES -->
  <div class="card p-3 mb-4">

    <h5 class="mb-3">Aniversariantes</h5>

    <div class="row g-2 mb-3">

      <div class="col-md-2">
        <select id="anivMes" class="form-select">
          <option value="01">Janeiro</option>
          <option value="02">Fevereiro</option>
          <option value="03">Março</option>
          <option value="04">Abril</option>
          <option value="05">Maio</option>
          <option value="06">Junho</option>
          <option value="07">Julho</option>
          <option value="08">Agosto</option>
          <option value="09">Setembro</option>
          <option value="10">Outubro</option>
          <option value="11">Novembro</option>
          <option value="12">Dezembro</option>
        </select>
      </div>

      <div class="col-md-2">
        <select id="anivAno" class="form-select"></select>
      </div>

      <div class="col-md-2">
        <button onclick="carregarAniversariantes()" class="btn btn-primary w-100">
          Filtrar
        </button>
      </div>

    </div>

    <div id="listaAniversariantes"></div>

  </div>

  <!-- 🔥 FILTRO CUPONS -->
  <div class="card p-3">

    <h5 class="mb-3">Cupons Ativos</h5>

    <div class="row g-2 mb-3">

      <div class="col-md-3">
        <input type="date" id="cuponsDataInicio" class="form-control">
      </div>

      <div class="col-md-3">
        <input type="date" id="cuponsDataFim" class="form-control">
      </div>

      <div class="col-md-2">
        <button onclick="carregarCupons()" class="btn btn-primary w-100">
          Filtrar
        </button>
      </div>

    </div>

    <div id="listaCupons"></div>

  </div>

</div>

<!-- 🔥 SCRIPTS -->
<script src="https://unpkg.com/@supabase/supabase-js@2"></script>
<script src="config.js"></script>
<script src="sidebar.js"></script>

<script>

/* ================= CONFIG ================= */

const SUPABASE_URL = CONFIG.SUPABASE_URL;
const SUPABASE_ANON_KEY = CONFIG.SUPABASE_ANON_KEY;

/* ================= TOKEN ================= */

async function getToken() {
  const { data } = await supabaseClient.auth.getSession();
  return data.session?.access_token;
}

async function fetchComAuth(url) {
  const token = await getToken();

  if (!token) {
    alert("Sessão expirada");
    window.location.href = "index.html";
    return [];
  }

  const res = await fetch(url, {
    headers: {
      apikey: SUPABASE_ANON_KEY,
      Authorization: `Bearer ${token}`
    }
  });

  return await res.json();
}

/* ================= HELPERS ================= */

function toISO(date) {
  return date.toISOString().split('T')[0];
}

/* ================= FILTROS ================= */

function inicializarFiltros() {

  const h = new Date();

  document.getElementById('anivMes').value = String(h.getMonth() + 1).padStart(2,'0');

  const selAno = document.getElementById('anivAno');
  for (let a = h.getFullYear(); a >= h.getFullYear() - 2; a--) {
    const opt = document.createElement('option');
    opt.value = a;
    opt.textContent = a;
    selAno.appendChild(opt);
  }

  selAno.value = h.getFullYear();

  const inicioMes = new Date(h.getFullYear(), h.getMonth(), 1);
  const fimMes = new Date(h.getFullYear(), h.getMonth() + 1, 0);

  document.getElementById('cuponsDataInicio').value = toISO(inicioMes);
  document.getElementById('cuponsDataFim').value = toISO(fimMes);
}

/* ================= ANIVERSARIANTES ================= */

async function carregarAniversariantes() {

  const mes = document.getElementById('anivMes').value;

  const dados = await fetchComAuth(
    `${SUPABASE_URL}/rest/v1/feedback_detalhado?select=nome,data_nascimento`
  );

  const filtrados = dados.filter(d => d.data_nascimento?.slice(5,7) === mes);

  const div = document.getElementById("listaAniversariantes");
  div.innerHTML = "";

  filtrados.forEach(c => {
    div.innerHTML += `<div>${c.nome} - ${c.data_nascimento}</div>`;
  });
}

/* ================= CUPONS ================= */

async function carregarCupons() {

  const ini = document.getElementById('cuponsDataInicio').value;
  const fim = document.getElementById('cuponsDataFim').value;

  const dados = await fetchComAuth(
    `${SUPABASE_URL}/rest/v1/cupons?select=codigo,cliente_nome,valido_ate&valido_ate=gte.${ini}&valido_ate=lte.${fim}`
  );

  const div = document.getElementById("listaCupons");
  div.innerHTML = "";

  dados.forEach(c => {
    div.innerHTML += `<div>${c.codigo} - ${c.cliente_nome}</div>`;
  });
}

/* ================= EXPORT ================= */

function exportarPDF() {
  html2pdf().from(document.querySelector('.conteudo')).save();
}

function exportarExcel() {
  const wb = XLSX.utils.book_new();
  XLSX.writeFile(wb, 'relatorio.xlsx');
}

/* ================= INIT ================= */

document.getElementById('tituloRelatorio').textContent =
  `Relatórios`;

inicializarFiltros();
carregarAniversariantes();
carregarCupons();

</script>

</body>
</html>
