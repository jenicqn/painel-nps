<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Relatórios</title>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

  <style>
    body {
      font-family: Arial;
      background: #111;
      color: #fff;
      padding: 20px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 20px;
    }

    th, td {
      padding: 10px;
      border-bottom: 1px solid #333;
      text-align: left;
    }

    button {
      background: #25D366;
      border: none;
      padding: 8px 12px;
      color: white;
      cursor: pointer;
      border-radius: 6px;
    }

    .expirando {
      color: orange;
    }

    .ativo {
      color: #00ff88;
    }
  </style>
</head>

<body>

<h2>Cupons Ativos</h2>

<table>
  <thead>
    <tr>
      <th>Nome</th>
      <th>Telefone</th>
      <th>Cupom</th>
      <th>Validade</th>
      <th>Ação</th>
    </tr>
  </thead>
  <tbody id="tabela-cupons"></tbody>
</table>

<script>
const SUPABASE_URL = CONFIG.SUPABASE_URL
const SUPABASE_KEY = CONFIG.SUPABASE_KEY
const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY)

document.addEventListener("DOMContentLoaded", () => {
  carregarCupons()
})

async function carregarCupons() {
  const hoje = new Date().toISOString()

  const { data, error } = await supabase
    .from("feedback_detalhado")
    .select("*")
    .eq("cupom_usado", false)
    .gt("validade_cupom", hoje)

  if (error) {
    console.error("Erro:", error)
    return
  }

  renderTabela(data)
}

function renderTabela(lista) {
  const tbody = document.getElementById("tabela-cupons")

  if (!tbody) {
    console.error("Tabela não encontrada")
    return
  }

  tbody.innerHTML = ""

  lista.forEach(item => {
    const tr = document.createElement("tr")

    const validade = new Date(item.validade_cupom)
    const hoje = new Date()
    const diffDias = Math.ceil((validade - hoje) / (1000 * 60 * 60 * 24))

    let classe = "ativo"
    if (diffDias <= 3) classe = "expirando"

    tr.innerHTML = `
      <td>${item.nome || "-"}</td>
      <td>${item.telefone || "-"}</td>
      <td>${item.cupom || "-"}</td>
      <td class="${classe}">${validade.toLocaleDateString()}</td>
      <td>
        <button onclick="enviarWhats('${item.telefone}', '${item.nome}', '${item.cupom}')">
          Whats
        </button>
      </td>
    `

    tbody.appendChild(tr)
  })
}

function enviarWhats(telefone, nome, cupom) {
  if (!telefone) return

  const msg = `Olá ${nome}! 🎉 Seu cupom ${cupom} está ativo! Aproveite antes de expirar 😉`

  const numero = telefone.replace(/\D/g, "")

  const url = `https://wa.me/55${numero}?text=${encodeURIComponent(msg)}`

  window.open(url, "_blank")
}
</script>

</body>
</html>
