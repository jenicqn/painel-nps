<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Relatórios - Smash do Cabo</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">
  <link rel="stylesheet" href="layout.css">
</head>
<body>

  <div id="sidebar-container"></div>

  <div class="conteudo">

    <div class="topbar d-flex justify-content-between align-items-center mb-4">
      <h3 id="tituloRelatorio">Relatórios</h3>
      <div class="d-flex gap-2">
        <button class="btn btn-sm btn-danger" onclick="exportarPDF()">
          <i class="bi bi-file-pdf"></i> PDF
        </button>
        <button class="btn btn-sm btn-success" onclick="exportarExcel()">
          <i class="bi bi-file-excel"></i> Excel
        </button>
      </div>
    </div>

    <!-- ANIVERSARIANTES DO MÊS -->
    <div class="card p-3 mb-4">
      <h5 class="mb-3">🎂 Aniversariantes do Mês</h5>
      <div id="resumoAniversariantes" class="text-muted small mb-2"></div>
      <div class="table-responsive">
        <table class="table table-sm" id="tabela-aniversariantes">
          <thead class="table-light">
            <tr>
              <th>Nome</th>
              <th>Telefone</th>
              <th>Nascimento</th>
              <th>WhatsApp</th>
            </tr>
          </thead>
          <tbody id="tbody-aniversariantes"></tbody>
        </table>
      </div>
    </div>

    <!-- CUPONS VENCENDO NA SEMANA -->
    <div class="card p-3 mb-4">
      <h5 class="mb-3">🎟️ Cupons Vencendo essa Semana</h5>
      <div id="resumoCupons" class="text-muted small mb-2"></div>
      <div class="table-responsive">
        <table class="table table-sm" id="tabela-cupons">
          <thead class="table-light">
            <tr>
              <th>Cliente</th>
              <th>Telefone</th>
              <th>Código</th>
              <th>Validade</th>
              <th>WhatsApp</th>
            </tr>
          </thead>
          <tbody id="tbody-cupons"></tbody>
        </table>
      </div>
    </div>

  </div>

  <script src="config.js"></script>
  <script src="sidebar.js"></script>
  <script>

    const SUPABASE_URL = CONFIG.SUPABASE_URL;
    const SUPABASE_KEY = CONFIG.SUPABASE_ANON_KEY;

    const headers = {
      apikey: SUPABASE_KEY,
      Authorization: `Bearer ${SUPABASE_KEY}`
    };

    function toISO(date) {
      return date.toISOString().split('T')[0];
    }

    function hoje() { return new Date(); }

    function inicioMes() {
      const d = hoje();
      return new Date(d.getFullYear(), d.getMonth(), 1);
    }

    function fimMes() {
      const d = hoje();
      return new Date(d.getFullYear(), d.getMonth() + 1, 0);
    }

    function inicioSemana() {
      const d = hoje();
      d.setHours(0,0,0,0);
      return d;
    }

    function fimSemana() {
      const d = hoje();
      d.setDate(d.getDate() + 6);
      d.setHours(23,59,59,999);
      return d;
    }

    function isHoje(dateStr) {
      return dateStr === toISO(hoje());
    }

    function isEstaSemana(dateStr) {
      const d = new Date(dateStr);
      return d >= inicioSemana() && d <= fimSemana();
    }

    function formatarData(iso) {
      if (!iso) return '-';
      const [y, m, d] = iso.split('-');
      return `${d}/${m}/${y}`;
    }

    function btnWhatsApp(telefone, mensagem) {
      const num = (telefone || '').replace(/[^0-9]/g, '');
      if (!num) return '-';
      const url = `https://wa.me/55${num}?text=${encodeURIComponent(mensagem)}`;
      return `<a href="${url}" target="_blank" class="btn btn-sm btn-success" title="WhatsApp">
        <i class="bi bi-whatsapp"></i>
      </a>`;
    }

    // =====================
    // ANIVERSARIANTES DO MÊS
    // =====================
    async function carregarAniversariantes() {
      const mesAtual = String(hoje().getMonth() + 1).padStart(2, '0');

      const res = await fetch(
        `${SUPABASE_URL}/rest/v1/feedback_detalhado?select=nome,telefone,data_nascimento&data_nascimento=not.is.null`,
        { headers }
      );
      const dados = await res.json();

      // Filtra quem tem aniversário neste mês
      const aniversariantes = dados.filter(c => {
        if (!c.data_nascimento) return false;
        const mes = c.data_nascimento.slice(5, 7);
        return mes === mesAtual;
      });

      // Ordena pelo dia
      aniversariantes.sort((a, b) => {
        const diaA = parseInt(a.data_nascimento.slice(8, 10));
        const diaB = parseInt(b.data_nascimento.slice(8, 10));
        return diaA - diaB;
      });

      document.getElementById('resumoAniversariantes').textContent =
        `${aniversariantes.length} aniversariante(s) este mês`;

      const tbody = document.getElementById('tbody-aniversariantes');
      tbody.innerHTML = '';

      if (!aniversariantes.length) {
        tbody.innerHTML = '<tr><td colspan="4" class="text-center text-muted">Nenhum aniversariante este mês.</td></tr>';
        return;
      }

      const anoAtual = hoje().getFullYear();

      aniversariantes.forEach(c => {
        // Monta a data com o ano atual para checar se é essa semana
        const anivEsteAno = `${anoAtual}-${c.data_nascimento.slice(5, 10)}`;
        const estaSemanaBool = isEstaSemana(anivEsteAno);
        const rowClass = estaSemanaBool ? 'table-warning' : '';

        const msg = `Olá ${c.nome?.split(' ')[0]}! 🎂 A equipe Smash do Cabo deseja um feliz aniversário! Esperamos te ver em breve 🍔`;

        tbody.innerHTML += `
          <tr class="${rowClass}">
            <td>${c.nome || '-'} ${estaSemanaBool ? '<span class="badge bg-warning text-dark ms-1">Esta semana</span>' : ''}</td>
            <td>${c.telefone || '-'}</td>
            <td>${formatarData(c.data_nascimento)}</td>
            <td>${btnWhatsApp(c.telefone, msg)}</td>
          </tr>
        `;
      });
    }

    // =====================
    // CUPONS VENCENDO NA SEMANA
    // =====================
    async function carregarCupons() {
      const ini = toISO(inicioSemana());
      const fim = toISO(fimSemana());
      const hojeISO = toISO(hoje());

      const res = await fetch(
        `${SUPABASE_URL}/rest/v1/cupons?select=codigo,cliente_nome,cliente_telefone,valido_ate,utilizado&valido_ate=gte.${ini}&valido_ate=lte.${fim}&utilizado=is.false&order=valido_ate.asc`,
        { headers }
      );
      const dados = await res.json();

      document.getElementById('resumoCupons').textContent =
        `${dados.length} cupom(ns) vencendo essa semana`;

      const tbody = document.getElementById('tbody-cupons');
      tbody.innerHTML = '';

      if (!dados.length) {
        tbody.innerHTML = '<tr><td colspan="5" class="text-center text-muted">Nenhum cupom vencendo essa semana.</td></tr>';
        return;
      }

      dados.forEach(c => {
        const venceHoje = c.valido_ate === hojeISO;
        const rowClass = venceHoje ? 'table-danger' : '';

        const msg = `Olá ${c.cliente_nome?.split(' ')[0]}! 🎟️ Seu cupom da Smash do Cabo vence ${venceHoje ? 'HOJE' : 'em breve'}! Não esqueça de usar: *${c.codigo}* 🍔`;

        tbody.innerHTML += `
          <tr class="${rowClass}">
            <td>${c.cliente_nome || '-'} ${venceHoje ? '<span class="badge bg-danger ms-1">Vence hoje</span>' : ''}</td>
            <td>${c.cliente_telefone || '-'}</td>
            <td><code>${c.codigo}</code></td>
            <td>${formatarData(c.valido_ate)}</td>
            <td>${btnWhatsApp(c.cliente_telefone, msg)}</td>
          </tr>
        `;
      });
    }

    // =====================
    // EXPORTAR
    // =====================
    function exportarPDF() {
      html2pdf().from(document.querySelector('.conteudo')).set({
        filename: 'relatorio-smash.pdf',
        margin: 10
      }).save();
    }

    function exportarExcel() {
      const wb = XLSX.utils.book_new();
      const tabAniv = document.getElementById('tabela-aniversariantes');
      const tabCupons = document.getElementById('tabela-cupons');
      XLSX.utils.book_append_sheet(wb, XLSX.utils.table_to_sheet(tabAniv), 'Aniversariantes');
      XLSX.utils.book_append_sheet(wb, XLSX.utils.table_to_sheet(tabCupons), 'Cupons');
      XLSX.writeFile(wb, 'relatorio-smash.xlsx');
    }

    // =====================
    // INIT
    // =====================
    const meses = ["Janeiro","Fevereiro","Março","Abril","Maio","Junho","Julho","Agosto","Setembro","Outubro","Novembro","Dezembro"];
    document.getElementById('tituloRelatorio').textContent =
      `Relatórios — ${meses[hoje().getMonth()]} ${hoje().getFullYear()}`;

    carregarAniversariantes();
    carregarCupons();

  </script>
</body>
</html>
