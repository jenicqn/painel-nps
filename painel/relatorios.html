<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Relatórios - Smash do Cabo</title>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">

  <link rel="stylesheet" href="layout.css">
</head>
<body>

  <div id="sidebar-container"></div>

  <div class="conteudo">

    <div class="topbar d-flex justify-content-between align-items-center mb-4">
      <h3 id="tituloRelatorio"></h3>

      <div class="d-flex gap-2">
        <button class="btn btn-sm btn-danger" onclick="exportarPDF()">PDF</button>
        <button class="btn btn-sm btn-success" onclick="exportarExcel()">Excel</button>
      </div>
    </div>

    <!-- ANIVERSARIANTES -->
    <div class="card p-3 mb-4">
      <h5>🎂 Aniversariantes</h5>

      <div class="row g-2 mb-3">
        <div class="col-auto">
          <select id="anivMes" class="form-select form-select-sm"></select>
        </div>

        <div class="col-auto">
          <select id="anivAno" class="form-select form-select-sm"></select>
        </div>

        <div class="col-auto">
          <button class="btn btn-sm btn-primary" onclick="carregarAniversariantes()">Filtrar</button>
        </div>
      </div>

      <table class="table table-sm">
        <thead>
          <tr>
            <th>Nome</th>
            <th>Telefone</th>
            <th>Nascimento</th>
            <th>WhatsApp</th>
          </tr>
        </thead>
        <tbody id="tbody-aniversariantes"></tbody>
      </table>
    </div>

    <!-- CUPONS -->
    <div class="card p-3">
      <h5>🎟️ Cupons</h5>

      <div class="row g-2 mb-3">
        <div class="col-auto">
          <input type="date" id="cuponsDataInicio" class="form-control form-control-sm">
        </div>

        <div class="col-auto">
          <input type="date" id="cuponsDataFim" class="form-control form-control-sm">
        </div>

        <div class="col-auto">
          <button class="btn btn-sm btn-primary" onclick="carregarCupons()">Filtrar</button>
        </div>
      </div>

      <table class="table table-sm">
        <thead>
          <tr>
            <th>Cliente</th>
            <th>Telefone</th>
            <th>Código</th>
            <th>Validade</th>
            <th>WhatsApp</th>
          </tr>
        </thead>
        <tbody id="tbody-cupons"></tbody>
      </table>
    </div>

  </div>

  <!-- ORDEM IMPORTA -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script> 
  <script src="config.js"></script>
  <script src="sidebar.js"></script>
  <script src="relatorios.js"></script>

</body>
</html>
